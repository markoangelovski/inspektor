  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 – Build & push Docker image
  # ─────────────────────────────────────────────────────────────────────────────
  build-push:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    # needs: test
    # Only push on main/master push or version tags — not on PRs
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: sha-${{ github.sha }}

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔧 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Auto-derives tags from git context:
      #   push to main/master  → latest + sha-<short>
      #   push tag v1.2.3      → 1.2.3 + 1.2 + 1 + latest + sha-<short>
      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.vendor=${{ vars.ORG_NAME || 'Your Org' }}

      - name: 🏗️ Build & push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache backend — vastly speeds up repeated builds by reusing
          # unchanged layers (composer deps, node_modules, base image layers)
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🖊️ Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_IMAGE }}
          readme-filepath: README.md

